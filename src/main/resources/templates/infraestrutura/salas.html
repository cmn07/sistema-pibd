<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
<div class="container" th:replace="~{fragments/header :: header} ">
    <h1>Salas</h1>

    <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>

    <!-- Formulário de cadastro/edição -->
    <form th:action="@{/infraestrutura/salas/salvar}" method="post">
        <input type="hidden" name="codigo" th:value="${salaSelecionada != null} ? ${salaSelecionada.codigo} : ''" />
        <div class="mb-3">
            <label for="numero" class="form-label">Número da Sala</label>
            <input type="text" id="numero" name="numero" class="form-control"
                   th:value="${salaSelecionada != null} ? ${salaSelecionada.numero} : ''" required />
        </div>
        <div class="mb-3">
            <label for="capacidade" class="form-label">Capacidade</label>
            <input type="number" id="capacidade" name="capacidade" class="form-control"
                   th:value="${salaSelecionada != null} ? ${salaSelecionada.capacidade} : ''" required />
        </div>
        <div class="mb-3">
            <label for="descricao" class="form-label">Descrição</label>
            <div class="mb-3">
            <label for="categoria" class="form-label">Categoria</label>
            <input type="text" id="categoria" name="categoria" class="form-control"
                   th:value="${salaSelecionada != null} ? ${salaSelecionada.categoria} : ''" />
        </div>
        <button type="submit" class="btn btn-primary">
            <span th:text="${salaSelecionada != null} ? 'Atualizar' : 'Cadastrar'"></span>
        </button>
    </form>

    <!-- Tabela de salas -->
    <table class="table mt-4">
        <thead><tr><th>#</th><th>Número</th><th>Capacidade</th><th>Descrição</th><th>Ações</th></tr></thead>
        <tbody>
            <tr th:each="s : ${salas}">
                <td th:text="${s.codigo}"></td>
                <td th:text="${s.numero}"></td>
                <td th:text="${s.capacidade}"></td>
                <td th:text="${s.descricao}"></td>
                <td>
                    <a th:href="@{'/infraestrutura/salas'(editar=${s.codigo})}" class="btn btn-sm btn-warning">Editar</a>
                    <form th:action="@{/infraestrutura/salas/excluir}" method="post" style="display:inline">
                        <input type="hidden" name="codigo" th:value="${s.codigo}" />
                        <button type="submit" class="btn btn-sm btn-danger">Excluir</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
