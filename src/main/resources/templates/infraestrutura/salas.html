<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Infraestrutura - Salas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="page-shell">
    <header class="topbar">
        <div>
            <a class="back-link" th:href="@{/infraestrutura/predios}">Voltar aos Prédios</a>
            <h1 class="page-title">Salas</h1>
        </div>
    </header>

    <section class="surface-panel" aria-label="Lista de Salas">
        <table class="records-table">
            <thead>
                <tr>
                    <th>Campus (Cidade)</th>
                    <th>Prédio (Bloco)</th>
                    <th>Número da Sala</th>
                    <th>Categoria</th>
                    <th>Capacidade</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(salas)}">
                    <td class="records-empty" colspan="5">Nenhum dado de infraestrutura encontrado.</td>
                </tr>
                <tr th:each="s : ${salas}">
                    <td>
                        <strong th:text="${s.campus.nome}"></strong>
                        <div class="record-meta" th:text="${s.campus.cidade}"></div>
                    </td>
                    <td>
                        <span th:text="${s.predio.nome}"></span>
                        <div class="record-meta" th:text="${s.predio.bloco != null ? 'Bloco: '+s.predio.bloco : ''}"></div>
                    </td>
                    <td th:text="${s.numero}"></td>
                    <td th:text="${s.categoria}"></td>
                    <td th:text="${s.capacidade + ' pessoas'}"></td>
                </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
